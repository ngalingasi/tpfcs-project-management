# TPFCS Project Management API — Nginx Configuration
# Place at: /etc/nginx/sites-available/tpfcs-projects
# Enable: ln -s /etc/nginx/sites-available/tpfcs-projects /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name projects.tpfcs.go.tz;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name projects.tpfcs.go.tz;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/projects.tpfcs.go.tz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/projects.tpfcs.go.tz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Hide server identity ──────────────────────────────────────────────────
    server_tokens off;                          # Removes nginx version from Server header

    # ── Security headers (let helmet handle these, but enforce at nginx too) ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Remove headers that leak info
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ── Rate limiting (backup to express-rate-limit) ──────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Proxy to Node.js ─────────────────────────────────────────────────────
    location /v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /v1/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }

    # Uploads — serve static files directly via nginx (faster than Node)
    location /uploads/ {
        alias /path/to/tpfcs-projects/uploads/;
        add_header Content-Disposition "attachment";
        # Only allow authenticated downloads — handled by Node proxy instead
        # Uncomment below to serve directly (skip Node auth check):
        # internal;
    }

    # Block common attack paths
    location ~* \.(env|git|sql|log|bak|conf|ini)$ {
        deny all;
        return 404;
    }

    # Logging
    access_log /var/log/nginx/tpfcs-projects.access.log;
    error_log  /var/log/nginx/tpfcs-projects.error.log warn;
}
