# TPFCS Project Management API — Nginx Configuration
# Place at: /etc/nginx/sites-available/projects.tpfcs.co.tz
# Enable: ln -s /etc/nginx/sites-available/projects.tpfcs.co.tz /etc/nginx/sites-enabled/
#
# IMPORTANT: Add these two lines inside the http {} block in /etc/nginx/nginx.conf:
#   limit_req_zone $binary_remote_addr zone=tpfcs_api:10m  rate=60r/m;
#   limit_req_zone $binary_remote_addr zone=tpfcs_auth:10m rate=10r/m;

server {
    listen 80;
    server_name projects.tpfcs.co.tz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name projects.tpfcs.co.tz;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/projects.tpfcs.co.tz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/projects.tpfcs.co.tz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Hide server identity ──────────────────────────────────────────────────
    server_tokens off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Remove headers that leak info
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ── Auth endpoints — stricter rate limit ──────────────────────────────────
    location /v1/auth/ {
        limit_req zone=tpfcs_auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── All other API endpoints ───────────────────────────────────────────────
    location /v1/ {
        limit_req zone=tpfcs_api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Block sensitive file types ────────────────────────────────────────────
    location ~* \.(env|git|sql|log|bak|conf|ini)$ {
        deny all;
        return 404;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/tpfcs-projects.access.log;
    error_log  /var/log/nginx/tpfcs-projects.error.log warn;
}
