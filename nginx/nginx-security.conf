# ── Paste these lines inside the http { } block in /etc/nginx/nginx.conf ──

# Hide nginx version and OS from Server header
server_tokens off;

# Prevent clickjacking globally
add_header X-Frame-Options "DENY" always;

# Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# Enforce HTTPS for 2 years
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# No referrer leaking
add_header Referrer-Policy "no-referrer" always;

# Disable browser features not needed by an API
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
